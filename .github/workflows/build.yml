name: Build and Deploy Firmware

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Extract version from platformio.ini
        id: version
        run: |
          VERSION=$(grep "^custom_version" platformio.ini | sed 's/custom_version *= *//' | tr -d ' \r')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build firmware
        run: pio run

      - name: Prepare Pages content
        run: |
          mkdir -p _site/firmware
          cp docs/index.html _site/
          cp .pio/build/m5stack-atom/bootloader.bin _site/firmware/
          cp .pio/build/m5stack-atom/partitions.bin _site/firmware/
          cp .pio/build/m5stack-atom/firmware.bin _site/firmware/
          VERSION=${{ steps.version.outputs.version }}
          sed "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" docs/manifest.json > _site/manifest.json
          cat _site/manifest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
